# App
spring.application.name=IT211_Prj

# ================= DATABASE =================
# MySQL connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/it211_prj?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=root
spring.datasource.password=yen030306.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ================= JPA =================
# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ================= JSON =================
# JSON date/time format
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ================= JWT =================
# JWT config
#app.jwt.secret=${JWT_SECRET:YOUR_SUPER_STRONG_SECRET_KEY}
app.jwt.secret=${JWT_SECRET:IT211_Prj_Dev_JWT_Secret_Key_32chars!!}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.clock-skew-seconds=60

# ================= FILE UPLOAD =================
# Max upload size (SRS: 15MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ================= CLOUDINARY =================
# Cloud storage config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ================= EMAIL =================
# Forgot password email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================= SWAGGER =================
# API documentation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ================= ERROR =================
# Show validation errors
server.error.include-message=always
server.error.include-binding-errors=always

# ================= LOGGING =================
# Application logs
logging.level.root=INFO
logging.level.com.it211_prj=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.file.name=logs/application.log
